stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: eduardotartas/gerenciamento-rural-api:$CI_COMMIT_SHORT_SHA
  KUBERNETES_NAMESPACE: "pasto-livre"
  # 1. Altera a comunicação para TCP apontando para o alias do serviço
  DOCKER_HOST: tcp://docker:2375
  # 2. Garante que o client não tente usar TLS, batendo com a flag --tls=false
  DOCKER_TLS_CERTDIR: ""

build_job:
  stage: build
  image: docker:24.0.5
  tags:
    - k3s-runner
  services:
    - name: docker:24.0.5-dind
      alias: docker
      command: ["--tls=false"]
  script:
    # O loop de espera do socket foi removido.
    - echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USER" --password-stdin
    - docker buildx create --use --driver docker-container
    - docker buildx build --platform linux/arm64 -t $DOCKER_IMAGE --push .

deploy_job:
  stage: deploy
  image: bitnami/kubectl:latest
  tags:
    - k3s-runner
  script:
    - kubectl set image deployment/gerenciamento-rural-api gerenciamento-rural-api=$DOCKER_IMAGE -n pasto-livre
    - kubectl rollout status deployment/gerenciamento-rural-api -n pasto-livre
  only:
    - main
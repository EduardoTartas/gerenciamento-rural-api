services:
  postgresql:
    container_name: postgresql-pasto-livre
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vol-postgresql-gerenciamento:/var/lib/postgresql/data
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gerenciamento-network

  api:
    container_name: api-pasto-livre
    build: ./
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      NODE_ENV: "production"
    ports:
      - 6060:6060
    env_file:
      - ./.env
    command: sh -c "npm ci && npx prisma migrate deploy && npm start"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - gerenciamento-network
    restart: unless-stopped

volumes:
  vol-postgresql-gerenciamento:

networks:
  gerenciamento-network:
    name: gerenciamento-network
    driver: bridge

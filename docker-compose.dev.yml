services:
  postgresql:
    container_name: postgresql-pasto-livre
    image: postgres:17-alpine
    logging:
      driver: "none"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vol-postgresql-gerenciamento:/var/lib/postgresql/data
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gerenciamento-network

  api:
    container_name: api-pasto-livre
    build: ./
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      NODE_ENV: "development"
      TERM: "xterm"
    ports:
      - 6060:6060
      - 51212:51212
    env_file:
      - ./.env
    volumes:
      - ./:/app:delegated
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && exec npm run dev:local"
    depends_on:
      postgresql:
        condition: service_healthy
    networks:
      - gerenciamento-network

volumes:
  vol-postgresql-gerenciamento:

networks:
  gerenciamento-network:
    name: gerenciamento-network
    driver: bridge
